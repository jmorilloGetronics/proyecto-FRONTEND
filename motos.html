<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concesionario Leo | Motos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/catalogo.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="brand">
                <h1>Concesionario Leo</h1>
                <p>Accede y explora el catalogo</p>
            </div>

            <nav class="top-nav" aria-label="Navegacion principal">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="catalogo.html" class="nav-link" id="nav-coches">Coches</a>
                <a href="motos.html" class="nav-link active" id="nav-motos">Motos</a>
            </nav>

            <span id="role-chip" class="role-chip hidden"></span>
            <button id="header-logout-btn" class="header-logout hidden" type="button">Cerrar sesion</button>
        </div>
    </header>

    <div id="login-toast" class="login-toast hidden" role="status" aria-live="polite">Login correcto</div>

    <main>
        <section id="login-panel" class="login-panel">
            <h2>Iniciar sesion</h2>
            <form id="login-form" class="login-form">
                <input id="username" name="username" type="text" placeholder="Usuario" value="usuario" required>
                <input id="password" name="password" type="password" placeholder="Contrasena" value="password" required>
                <button type="submit">Entrar</button>
            </form>
            <p id="login-status" class="status">Credenciales: usuario/password o admin/pass123.</p>
        </section>

        <section id="admin-panel" class="admin-panel hidden">
            <h2>Panel de administracion</h2>
            <form id="vehiculo-form" class="admin-form">
                <input id="vehiculo-id" type="hidden">
                <input id="vehiculo-marca" type="text" placeholder="Marca" required>
                <input id="vehiculo-modelo" type="text" placeholder="Modelo" required>
                <input id="vehiculo-precio" type="number" min="0" placeholder="Precio" required>

                <label class="checkbox-row" for="vehiculo-stock">
                    <input id="vehiculo-stock" type="checkbox" checked>
                    En stock
                </label>

                <div class="admin-actions">
                    <button id="guardar-vehiculo-btn" type="submit">Guardar moto</button>
                    <button id="cancelar-edicion-btn" type="button" class="ghost hidden">Cancelar edicion</button>
                </div>
            </form>
            <p id="admin-status" class="admin-status"></p>
        </section>

        <div id="lista-motos" class="contenedor hidden"></div>
    </main>

    <script src="assets/js/motos.js"></script>
</body>
</html>
